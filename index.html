            const [result, setResult] = useState(null);
            const langRef = useRef(null);

            const t = UI_TEXT[lang];

            const startQuiz = () => {
                setStep('quiz');
                setCurrentQuestion(0);
                setScores({ zen: 0, warrior: 0, nature: 0, explorer: 0, healing: 0, spiritual: 0, traditionalist: 0, social: 0 });
            };

            const backToHome = () => {
                setStep('landing');
                setResult(null);
            };

            const handleAnswer = (score) => {
                const newScores = { ...scores };
                Object.keys(score).forEach(key => { if (newScores.hasOwnProperty(key)) newScores[key] += score[key]; });
                setScores(newScores);
                if (currentQuestion < QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const winner = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    setResult(RESULTS[winner]);
                    setStep('result');
                }
            };

                const shareText = lang === 'th' ? `ฉันคือ "${result.title.th}"! มาค้นหาจิตวิญญาณ Yogi ของคุณกัน` : `I am "${result.title.en}"! Discover your Yogi soul here:`;

                    {/* ✅ Header (Navigation Bar) - เพิ่มพื้นหลังโปร่งแสงในหน้า Result และไม่ Pin Fix */}
                    <div className={`w-full max-w-md p-4 flex justify-between items-center z-50 transition-all duration-500 ${step === 'result' ? 'glass-header rounded-b-3xl mb-4' : ''}`}>
                        <div className={`flex items-center gap-2 ${step === 'landing' || step === 'result' ? 'text-white' : 'text-[#2c3e50]'}`}>
                            <YogaBallLogo className="w-6 h-6" />
                            <span className="text-[10px] font-black uppercase tracking-tight opacity-80">Yogi Soul Discovery</span>
                        </div>
                        <div className="relative" ref={langRef}>
                            <button onClick={() => setIsLangOpen(!isLangOpen)} className="bg-white shadow-dropdown border border-stone-100 pl-2 pr-1 py-1 rounded-[6px] flex items-center gap-2 text-[11px] font-bold text-stone-700 active:scale-95 transition-all">
                                <span className="text-base leading-none">{t.flag}</span>
                                <span className="min-w-[60px] text-left font-bold">{lang === 'th' ? 'ภาษาไทย' : 'English'}</span>
                                <IconRenderer name="ChevronDown" className="w-3 h-3 text-stone-300 transition-transform" />
                            </button>
                            {isLangOpen && (
                                <div className="absolute top-full right-0 mt-2 bg-white shadow-2xl rounded-[8px] border border-stone-100 overflow-hidden animate-in fade-in slide-in-from-top-1 z-50">
                                    <button onClick={() => {setLang('th'); setIsLangOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-2 text-[11px] font-bold hover:bg-stone-50 ${lang === 'th' ? 'bg-stone-50 text-[#10b981]' : 'text-stone-600'}`}>
                                        <span>🇹🇭</span> ภาษาไทย
                                    </button>
                                    <button onClick={() => {setLang('en'); setIsLangOpen(false);}} className={`w-full flex items-center gap-3 px-4 py-2 text-[11px] font-bold hover:bg-stone-50 ${lang === 'en' ? 'bg-stone-50 text-[#10b981]' : 'text-stone-600'}`}>
                                        <span>🇺🇸</span> English
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Content Container */}
                    <div className={`w-full max-w-md min-h-screen flex flex-col relative shadow-xl overflow-hidden transition-all duration-700 ${step === 'landing' ? 'bg-gradient-to-b from-[#10b981] via-[#059669] to-[#06b6d4]' : step === 'result' && result ? result.bg : 'bg-[#fdfaf5]'}`}>
                        <div className="flex-1 overflow-y-auto pb-8">
                            
                            {step === 'landing' && (
                                <div className="p-8 text-center animate-in fade-in flex flex-col items-center justify-center min-h-[80vh]">
                                    <div className="mb-8 relative animate-float">
                                        <YogaBallLogo className="w-56 h-56 text-white drop-shadow-2xl" />
                                    </div>
                                    <div className="space-y-1 mb-10 text-white text-center">
                                        <p className="text-xl font-medium tracking-wide drop-shadow-sm">{t.titlePrefix}</p>
                                        <h1 className="text-6xl font-black text-outline uppercase tracking-tighter drop-shadow-lg leading-tight">
                                            {t.titleMain}
                                        </h1>
                                        <div className="h-4" />
                                        <p className="text-white/90 text-sm font-medium leading-relaxed px-4 drop-shadow-sm max-w-xs mx-auto italic opacity-90">{t.desc}</p>
                                    </div>
                                    <button onClick={startQuiz} className="w-full max-w-[280px] bg-[#344154] text-white py-5 rounded-[2rem] font-black shadow-2xl active:scale-95 transition-all text-xl mt-4 hover:bg-[#2c3e50]">
                                        {t.startBtn}
                                    </button>
                                    <div className="mt-8 flex items-center justify-center gap-2 text-white/50 text-[10px] font-bold uppercase tracking-[0.3em]">
                                        <span>{t.analysis}</span>
                                    </div>
                                </div>
                            )}

                            {step === 'quiz' && (
                                <div className="p-8 animate-in slide-in-from-right duration-500 bg-[#ebebeb] min-h-full rounded-t-[3rem] mt-4 shadow-inner">
                                    <div className="mb-10 flex justify-between items-end px-2">
                                        <div>
                                            <p className="text-[11px] font-black text-[#10b981] uppercase mb-2 tracking-widest">{t.question}</p>
                                            <h3 className="text-5xl font-black text-[#2c3e50] leading-none">
                                                {currentQuestion + 1}<span className="text-stone-300 text-xl font-normal"> / {QUESTIONS.length}</span>
                                            </h3>
                                        </div>
                                        <div className="text-[11px] font-bold text-stone-400 mb-1">{Math.round(((currentQuestion + 1) / QUESTIONS.length) * 100)}%</div>
                                    </div>
                                    <div className="w-full bg-stone-200/50 h-[6px] rounded-full overflow-hidden mb-12 mx-2">
                                        <div className="bg-[#10b981] h-full transition-all duration-1000" style={{ width: `${((currentQuestion + 1) / QUESTIONS.length) * 100}%` }}></div>
                                    </div>
                                    <h2 className="text-3xl font-bold mb-14 text-[#2c3e50] leading-tight px-2 text-center">{QUESTIONS[currentQuestion].question[lang]}</h2>
                                    <div className="space-y-4 px-2 pb-10">
                                        {QUESTIONS[currentQuestion].options.map((option, idx) => (
                                            <button key={idx} onClick={() => handleAnswer(option.score)} className="w-full text-left p-6 bg-white/80 rounded-[1.5rem] hover:bg-white hover:shadow-lg transition-all flex items-center justify-between active:scale-[0.98] group">
                                                <span className="text-[#2c3e50] font-bold text-lg pr-4">{option.text[lang]}</span>
                                                <IconRenderer name="ChevronRight" className="w-5 h-5 text-stone-300" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {step === 'result' && result && (
                                <div className="flex flex-col items-center animate-in fade-in duration-1000 relative min-h-full pb-10">
                                    <Confetti />
                                    <div className="w-full pt-8 px-6 flex flex-col items-center text-center">
                                        <h1 className="text-5xl font-black text-white text-outline uppercase tracking-tighter drop-shadow-2xl leading-tight mb-6">
                                            {String(result.title[lang] || "")}
                                        </h1>
                                        <div className="w-full bg-white rounded-[2.5rem] p-6 shadow-2xl mb-8 border border-white/20 overflow-hidden text-left">
                                            <div className="flex items-center gap-3 mb-6">
                                                <div className="p-3 bg-stone-50 rounded-2xl border border-stone-100 shadow-sm">
                                                    <IconRenderer name={result.iconName} className={`w-8 h-8 ${result.iconColor}`} />
                                                </div>
                                                <div>
                                                    <p className="text-[#ff4d6d] text-[10px] font-black uppercase tracking-[0.2em]">{t.soulTypeLabel}</p>
                                                    <h2 className="text-2xl font-black text-[#2c3e50] leading-none mt-1">{String(result.title[lang] || "")}</h2>
                                                    <p className="text-stone-400 font-bold text-xs mt-1">{String(result.subtitle[lang] || "")}</p>
                                                </div>
                                            </div>
                                            <div className="w-full aspect-square bg-stone-50 rounded-[2rem] overflow-hidden mb-6 border border-stone-100">
                                                <img src={result.imageUrl} alt="Result" className="w-full h-full object-cover" />
                                            </div>
                                            <div className="text-center px-4 mb-4">
                                                <p className="text-stone-500 font-medium text-sm leading-relaxed italic opacity-90">
                                                    "{String(result.description[lang] || "")}"
                                                </p>
                                            </div>
                                        </div>
                                        
                                        <div className="text-center mb-8">
                                            <p className="text-white font-bold text-lg tracking-wide italic drop-shadow-lg opacity-90">{t.innerIdentity}</p>
                                        </div>

                                        {/* ✅ ปุ่มชวนเพื่อนมาเล่นแบบเต็มความกว้างพร้อมไอคอนแชร์ (ปุ่มเดียว) */}
                                        <div className="w-full mb-6 px-2">
                                            <button onClick={handleShare} className="w-full py-5 rounded-[2rem] bg-white text-[#2c3e50] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                                                <IconRenderer name="Share2" className="w-6 h-6 text-[#10b981]" />
                                                {t.inviteBtn}
                                            </button>
                                        </div>

                                        <button onClick={backToHome} className="text-white/60 text-sm font-bold underline mb-12 hover:text-white transition-colors">{t.restartBtn}</button>
                                        <p className="text-white/30 text-[9px] font-bold uppercase tracking-[0.3em] mb-12">{t.created}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
