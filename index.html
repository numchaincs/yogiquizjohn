<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogi Personality Quiz | Discover Your Yogi Soul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { font-family: 'Noto Sans Thai', sans-serif; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .text-outline { color: transparent; -webkit-text-stroke: 2px white; }
        body { background-color: #fdfaf5; margin: 0; overflow-x: hidden; }
        .glass-header {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .capture-loading {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UI Constants ---
        const UI_TEXT = {
            th: { startBtn: "เริ่มเลย", shareStoryBtn: "แชร์ผลลัพธ์", inviteBtn: "ชวนเพื่อน", restartBtn: "กลับหน้าแรก", titlePrefix: "Discover Your", titleMain: "Yogi Soul", desc: "ค้นหาตัวตนผ่านโยคะ ตอบคำถาม 8 ข้อเพื่อรู้จักตัวเอง", question: "คำถาม", soulTypeLabel: "ตัวตนของคุณคือ...", preparing: "กำลังสร้างรูปภาพ...", copied: "คัดลอกลิงก์แล้ว!", flag: "🇹🇭" },
            en: { startBtn: "Start Now", shareStoryBtn: "Share Result", inviteBtn: "Invite", restartBtn: "Back to Home", titlePrefix: "Discover Your", titleMain: "Yogi Soul", desc: "Unveil your true essence through yoga.", question: "Question", soulTypeLabel: "Your Soul Type is...", preparing: "Generating image...", copied: "Copied!", flag: "🇺🇸" }
        };

        const RESULTS = {
            zen: { title: { th: "The Zen Master", en: "The Zen Master" }, subtitle: { th: "ผู้แสวงหาความสงบ", en: "Serenity Seeker" }, bg: "bg-[#7c3aed]", bgCap: "#7c3aed", icon: "Moon", color: "text-indigo-400", img: "https://i.ibb.co/mCPjVvzr/yogi-zen.png" },
            warrior: { title: { th: "The Power Warrior", en: "The Power Warrior" }, subtitle: { th: "นักรบผู้แข็งแกร่ง", en: "Strength Seeker" }, bg: "bg-[#ea580c]", bgCap: "#ea580c", icon: "Flame", color: "text-orange-400", img: "https://i.ibb.co/ycxc7xHK/yogi-warrior.png" },
            nature: { title: { th: "The Nature Seeker", en: "The Nature Seeker" }, subtitle: { th: "ผู้รักธรรมชาติ", en: "Nature Lover" }, bg: "bg-[#059669]", bgCap: "#059669", icon: "Leaf", color: "text-emerald-400", img: "https://i.ibb.co/W4JrvTJb/yogi-nature.png" },
            explorer: { title: { th: "The Modern Explorer", en: "The Modern Explorer" }, subtitle: { th: "นักสำรวจโยคะ", en: "Modern Yogi" }, bg: "bg-[#e11d48]", bgCap: "#e11d48", icon: "Sparkles", color: "text-pink-400", img: "https://i.ibb.co/spvqrxc8/yogi-explorer.png" },
            healing: { title: { th: "The Healing Soul", en: "The Healing Soul" }, subtitle: { th: "ผู้เยียวยาจิตใจ", en: "Restorative Soul" }, bg: "bg-[#db2777]", bgCap: "#db2777", icon: "Heart", color: "text-rose-400", img: "https://i.ibb.co/prRdCYT7/yogi-healing.png" },
            spiritual: { title: { th: "The Spiritual Guide", en: "The Spiritual Guide" }, subtitle: { th: "ผู้เชื่อมต่อจิตวิญญาณ", en: "Mystical Spirit" }, bg: "bg-[#d97706]", bgCap: "#d97706", icon: "Star", color: "text-amber-400", img: "https://i.ibb.co/q33QDWKL/yogi-spiritual.png" },
            traditionalist: { title: { th: "The Disciplined", en: "The Disciplined" }, subtitle: { th: "ผู้อนุรักษ์แบบแผน", en: "Classic Yogi" }, bg: "bg-[#475569]", bgCap: "#475569", icon: "Anchor", color: "text-slate-400", img: "https://i.ibb.co/Z6kfsh3B/yogi_traditionalist.png" },
            social: { title: { th: "The Social Flow-er", en: "The Social Flow-er" }, subtitle: { th: "ผู้เติมพลังผ่านกลุ่ม", en: "Community Soul" }, bg: "bg-[#0891b2]", bgCap: "#0891b2", icon: "Users", color: "text-cyan-400", img: "https://i.ibb.co/ty6MVxJ/yogi-social.png" }
        };

        const QUESTIONS = [
            { q: { th: "คุณชอบฝึกโยคะช่วงไหน?", en: "When do you flow?" }, options: [ { t: { th: "เช้าตรู่", en: "At dawn" }, s: { warrior: 2, traditionalist: 2 } }, { t: { th: "บ่ายๆ", en: "Midday" }, s: { nature: 2, social: 2 } }, { t: { th: "เย็น", en: "Evening" }, s: { explorer: 2, healing: 2 } }, { t: { th: "ก่อนนอน", en: "Before bed" }, s: { zen: 2, spiritual: 2 } } ] },
            { q: { th: "สถานที่ฝึกในฝัน?", en: "Dream sanctuary?" }, options: [ { t: { th: "สตูดิโอมินิมอล", en: "Studio" }, s: { explorer: 2, traditionalist: 1 } }, { t: { th: "ริมทะเล", en: "Ocean" }, s: { nature: 3 } }, { t: { th: "ที่บ้าน", en: "Home" }, s: { zen: 2, healing: 1 } }, { t: { th: "ฟิตเนส", en: "Gym" }, s: { warrior: 2, social: 1 } } ] },
            { q: { th: "เป้าหมายหลักคือ?", en: "Main goal?" }, options: [ { t: { th: "แข็งแรง", en: "Strength" }, s: { warrior: 3 } }, { t: { th: "แก้เครียด", en: "Healing" }, s: { healing: 3 } }, { t: { th: "ยืดหยุ่น", en: "Flexibility" }, s: { traditionalist: 2 } }, { t: { th: "ท้าทายตัวเอง", en: "Challenge" }, s: { explorer: 2 } } ] },
            { q: { th: "ถ้าเจอท่าที่ยาก?", en: "Difficult pose?" }, options: [ { t: { th: "สู้ตาย", en: "Hold it" }, s: { warrior: 2 } }, { t: { th: "ตามที่ไหว", en: "Ease in" }, s: { nature: 2 } }, { t: { th: "หาเพื่อนช่วย", en: "Ask friend" }, s: { social: 3 } }, { t: { th: "ใช้พร็อพ", en: "Use props" }, s: { traditionalist: 2 } } ] },
            { q: { th: "เพลงที่ชอบ?", en: "Soundtrack?" }, options: [ { t: { th: "ธรรมชาติ", en: "Nature" }, s: { nature: 2 } }, { t: { th: "บทสวด", en: "Chanting" }, s: { spiritual: 3 } }, { t: { th: "เพลงสนุกๆ", en: "Upbeat" }, s: { social: 1, explorer: 2 } }, { t: { th: "ความเงียบ", en: "Silence" }, s: { zen: 2 } } ] },
            { q: { th: "สีชุดที่เลือก?", en: "Gear color?" }, options: [ { t: { th: "เอิร์ธโทน", en: "Earth" }, s: { nature: 2 } }, { t: { th: "ขาว/พาสเทล", en: "White" }, s: { zen: 2 } }, { t: { th: "สดใส", en: "Bright" }, s: { social: 2 } }, { t: { th: "ดำ/เข้ม", en: "Dark" }, s: { warrior: 2 } } ] },
            { q: { th: "ท่าที่คุณชอบ?", en: "Favorite pose?" }, options: [ { t: { th: "Savasana", en: "Savasana" }, s: { healing: 3 } }, { t: { th: "Warrior", en: "Warrior" }, s: { warrior: 3 } }, { t: { th: "Tree Pose", en: "Tree" }, s: { nature: 2 } }, { t: { th: "คู่กับเพื่อน", en: "Partner" }, s: { social: 3 } } ] },
            { q: { th: "หลังจบ Class?", en: "After practice?" }, options: [ { t: { th: "สงบ", en: "Peace" }, s: { zen: 2 } }, { t: { th: "สะใจ", en: "Satisfied" }, s: { warrior: 2 } }, { t: { th: "มีความสุขกับกลุ่ม", en: "Connected" }, s: { social: 3 } }, { t: { th: "หายเหนื่อย", en: "Restored" }, s: { healing: 2 } } ] }
        ];

        // --- Helper Components ---
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase()} className={className}></i>;
        };

        const YogaBallLogo = ({ className }) => (
            <svg viewBox="0 0 1115 1095" fill="none" className={className} xmlns="http://www.w3.org/2000/svg">
                <path d="M515.273 0.949963C459.873 4.14997 407.873 14.95 355.473 34.15C329.273 43.95 280.473 67.95 256.673 82.95C245.873 89.75 236.473 94.75 235.673 93.95C234.873 93.15 234.273 79.55 234.073 63.55C234.073 34.95 234.073 34.55 229.073 31.75C226.473 30.35 220.473 29.15 215.873 28.95C205.473 28.95 200.073 33.95 198.273 45.75C197.473 50.15 194.873 55.95 192.473 58.55C186.073 65.75 187.073 81.95 194.873 101.35C198.473 109.75 201.273 117.95 201.273 119.35L211.673 179.95C216.873 198.55 217.673 207.35 218.073 251.15C219.073 312.95 228.273 368.15 243.473 400.95C254.673 425.35 264.473 429.95 305.273 429.95C330.473 429.95 333.473 429.35 351.273 423.35C371.073 416.35 389.673 406.95 405.473 395.75C426.673 380.95 435.873 379.35 444.073 388.95C451.273 397.75 451.873 406.75 448.273 457.95C444.073 520.75 441.273 587.75 442.673 602.15C443.473 610.35 442.673 616.95 440.473 623.95C434.473 641.15 431.073 661.35 429.273 687.95C428.473 702.15 425.273 728.35 422.473 745.95C416.673 781.15 409.873 861.35 408.073 912.95C406.473 960.95 407.473 958.35 393.673 960.95C353.073 968.95 309.673 981.95 285.473 993.55L299.273 1012.35C411.073 1059.55 474.273 1069.35 547.273 1073.55C687.673 1058.95 802.873 1007.95 824.073 995.15C826.473 991.35 662.273 964.75 633.073 961.35C517.873 959.55 452.273 963.15 312.873 993.95" fill="white"/>
            </svg>
        );

        // --- Main App ---
        function App() {
            const [lang, setLang] = useState('th');
            const [isLangOpen, setIsLangOpen] = useState(false);
            const [step, setStep] = useState('landing');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({ zen:0, warrior:0, nature:0, explorer:0, healing:0, spiritual:0, traditionalist:0, social:0 });
            const [result, setResult] = useState(null);
            const [isCapturing, setIsCapturing] = useState(false);
            const cardRef = useRef(null);
            const t = UI_TEXT[lang];

            const startQuiz = () => {
                setStep('quiz');
                setCurrentQ(0);
                setScores({ zen:0, warrior:0, nature:0, explorer:0, healing:0, spiritual:0, traditionalist:0, social:0 });
            };

            const handleAnswer = (s) => {
                const nextScores = { ...scores };
                Object.keys(s).forEach(k => nextScores[k] += s[k]);
                setScores(nextScores);
                if (currentQ < QUESTIONS.length - 1) {
                    setCurrentQ(currentQ + 1);
                } else {
                    const winner = Object.keys(nextScores).reduce((a, b) => nextScores[a] > nextScores[b] ? a : b);
                    setResult(RESULTS[winner]);
                    setStep('result');
                }
            };

            const captureAndShare = async () => {
                if (!cardRef.current) return;
                setIsCapturing(true);

                // พักเครื่อง 0.5 วิ ให้ UI นิ่ง
                await new Promise(r => setTimeout(r, 500));

                try {
                    const canvas = await html2canvas(cardRef.current, {
                        useCORS: true,
                        scale: 2,
                        backgroundColor: null,
                    });

                    canvas.toBlob(async (blob) => {
                        if (!blob) return setIsCapturing(false);
                        const file = new File([blob], 'yogi-soul.png', { type: 'image/png' });
                        const shareText = lang === 'th' ? `ฉันคือ "${result.title.th}"! มาลองเล่นกัน 🧘` : `I am "${result.title.en}"! 🧘`;

                        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                            try {
                                await navigator.share({ files: [file], title: 'Yogi Soul Quiz', text: shareText });
                            } catch (e) {}
                        } else {
                            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'yogi-result.png'; a.click();
                        }
                        setIsCapturing(false);
                    }, 'image/png');
                } catch (e) {
                    console.error(e);
                    setIsCapturing(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center">
                    {/* Capture Loader */}
                    {isCapturing && (
                        <div className="capture-loading">
                            <div className="text-center text-white">
                                <div className="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                <p className="font-bold uppercase tracking-widest">{t.preparing}</p>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className={`w-full max-w-md p-4 flex justify-between items-center z-50 ${step === 'result' ? 'glass-header rounded-b-2xl' : ''}`}>
                        <div className={`flex items-center gap-2 ${step === 'landing' || step === 'result' ? 'text-white' : 'text-slate-800'}`}>
                            <YogaBallLogo className="w-6 h-6" />
                            <span className="text-[10px] font-black uppercase tracking-tighter opacity-80">Yogi Soul Discovery</span>
                        </div>
                        <div className="relative">
                            <button onClick={() => setIsLangOpen(!isLangOpen)} className="bg-white px-3 py-1 rounded-lg border shadow-sm text-xs font-bold flex items-center gap-2">
                                <span>{t.flag}</span> {lang.toUpperCase()} <Icon name="ChevronDown" className="w-3 h-3 text-slate-300" />
                            </button>
                            {isLangOpen && (
                                <div className="absolute right-0 top-full mt-2 bg-white rounded-lg shadow-xl border overflow-hidden">
                                    <button onClick={() => { setLang('th'); setIsLangOpen(false); }} className="px-6 py-2 text-xs font-bold hover:bg-slate-50 w-full text-left">🇹🇭 TH</button>
                                    <button onClick={() => { setLang('en'); setIsLangOpen(false); }} className="px-6 py-2 text-xs font-bold hover:bg-slate-50 w-full text-left">🇺🇸 EN</button>
                                </div>
                            )}
                        </div>
                    </header>

                    {/* Container */}
                    <main className={`w-full max-w-md min-h-screen flex flex-col relative transition-all duration-700 ${step === 'landing' ? 'bg-emerald-600' : step === 'result' ? result.bg : 'bg-slate-50'}`}>
                        
                        {step === 'landing' && (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center text-white animate-in fade-in">
                                <YogaBallLogo className="w-48 h-48 mb-8 animate-float drop-shadow-2xl" />
                                <h1 className="text-5xl font-black text-outline uppercase tracking-tighter mb-4 leading-none">{t.titleMain}</h1>
                                <p className="text-white/80 font-medium mb-12 italic px-8">{t.desc}</p>
                                <button onClick={startQuiz} className="w-full max-w-[260px] bg-slate-800 py-5 rounded-full font-black text-xl shadow-2xl active:scale-95 transition-all">{t.startBtn}</button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="flex-1 p-8 animate-in slide-in-from-right">
                                <div className="mb-12">
                                    <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-1">{t.question}</p>
                                    <h2 className="text-4xl font-black text-slate-800">{currentQ + 1} <span className="text-slate-300 text-lg">/ 8</span></h2>
                                    <div className="w-full h-1 bg-slate-200 rounded-full mt-4 overflow-hidden">
                                        <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${((currentQ + 1) / 8) * 100}%` }}></div>
                                    </div>
                                </div>
                                <h3 className="text-2xl font-bold text-slate-800 mb-12 text-center">{QUESTIONS[currentQ].q[lang]}</h3>
                                <div className="space-y-3">
                                    {QUESTIONS[currentQ].options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt.s)} className="w-full text-left p-5 bg-white rounded-2xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-between">
                                            <span className="font-bold text-slate-700 text-lg">{opt.t[lang]}</span>
                                            <Icon name="ChevronRight" className="w-5 h-5 text-slate-200" />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="flex-1 flex flex-col items-center p-6 animate-in fade-in">
                                {/* Result Card to Capture */}
                                <div ref={cardRef} className="w-full p-4 rounded-3xl" style={{ backgroundColor: result.bgCap }}>
                                    <h2 className="text-3xl font-black text-white text-outline uppercase text-center mb-6 tracking-tighter">{result.title[lang]}</h2>
                                    <div className="bg-white rounded-[2rem] p-6 shadow-2xl">
                                        <div className="flex items-center gap-4 mb-6">
                                            <div className="p-3 bg-slate-50 rounded-2xl"><Icon name={result.icon} className={`w-8 h-8 ${result.color}`} /></div>
                                            <div>
                                                <p className="text-rose-500 text-[10px] font-black uppercase tracking-widest">{t.soulTypeLabel}</p>
                                                <h3 className="text-xl font-black text-slate-800">{result.title[lang]}</h3>
                                                <p className="text-slate-400 font-bold text-xs">{result.subtitle[lang]}</p>
                                            </div>
                                        </div>
                                        <div className="aspect-square rounded-3xl overflow-hidden mb-6 bg-slate-100 border">
                                            <img src={result.img} className="w-full h-full object-cover" crossOrigin="anonymous" />
                                        </div>
                                        <p className="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em] text-center">yogiquizjohn.vercel.app</p>
                                    </div>
                                </div>

                                {/* Buttons - Not Captured */}
                                <div className="w-full flex gap-3 mt-8">
                                    <button onClick={() => { navigator.share ? navigator.share({url:"https://yogiquizjohn.vercel.app/"}) : alert(t.copied) }} className="flex-1 py-5 bg-white/20 border border-white/30 rounded-2xl text-white font-black flex flex-col items-center gap-2 backdrop-blur-md active:scale-95 transition-all">
                                        <Icon name="UserPlus" className="w-6 h-6" /> <span className="text-sm">{t.inviteBtn}</span>
                                    </button>
                                    <button onClick={captureAndShare} className="flex-1 py-5 bg-white rounded-2xl text-slate-800 font-black flex flex-col items-center gap-2 shadow-xl active:scale-95 transition-all">
                                        <Icon name="Share2" className="w-6 h-6 text-emerald-500" /> <span className="text-sm">{t.shareStoryBtn}</span>
                                    </button>
                                </div>
                                <button onClick={backToHome} className="mt-8 text-white/50 text-sm font-bold underline">{t.restartBtn}</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
